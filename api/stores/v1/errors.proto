syntax = "proto3";

package stores.v1;

import "errors/errors.proto";

option go_package = "github.com/makesalekz/stores/api/stores/v1;stores_v1";

enum ErrorReason {
  option (errors.default_code) = 500;

  INTERNAL = 0;
  NOT_FOUND = 1 [(errors.code) = 404];
  INVALID_REQUEST = 2 [(errors.code) = 400];
  FORBIDDEN = 3 [(errors.code) = 403];
  EMPTY_ACTOR_ID = 4 [(errors.code) = 401];
}
